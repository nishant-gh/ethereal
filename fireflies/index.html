<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fireflies — Ethereal</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap');
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body { min-height: 100vh; overflow: hidden; background: #060d04; font-family: 'Cormorant Garamond', serif; color: #d4e8c2; }
  canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
  .forest {
    position: fixed; bottom: 0; left: 0; width: 100%; height: 45%; z-index: 1; pointer-events: none;
    background: linear-gradient(to top, rgba(8, 20, 6, 0.95) 0%, rgba(8, 20, 6, 0.7) 30%, rgba(8, 20, 6, 0.3) 60%, transparent 100%);
  }
  .trees { position: fixed; bottom: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }
  .content { position: relative; z-index: 10; text-align: center; padding: 2rem; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; animation: fadeIn 3s ease-out; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  h1 { font-size: clamp(2.5rem, 7vw, 6rem); font-weight: 300; letter-spacing: 0.25em; text-transform: lowercase; background: linear-gradient(135deg, #a8e063 0%, #f0e68c 35%, #ffd700 60%, #a8e063 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; filter: drop-shadow(0 0 30px rgba(168, 224, 99, 0.4)); animation: glow 4s ease-in-out infinite; }
  @keyframes glow { 0%, 100% { filter: drop-shadow(0 0 30px rgba(168, 224, 99, 0.3)); } 50% { filter: drop-shadow(0 0 50px rgba(255, 215, 0, 0.5)); } }
  .line { width: 100px; height: 1px; background: linear-gradient(90deg, transparent, rgba(168, 224, 99, 0.4), transparent); margin: 1.5rem auto; }
  p { font-size: clamp(0.95rem, 2vw, 1.3rem); font-weight: 300; font-style: italic; letter-spacing: 0.12em; opacity: 0.7; max-width: 450px; line-height: 1.8; }
  a.back { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); color: rgba(212, 232, 194, 0.4); text-decoration: none; font-size: 0.9rem; letter-spacing: 0.2em; transition: color 0.3s; z-index: 20; }
  a.back:hover { color: rgba(212, 232, 194, 0.8); }
</style>
</head>
<body>
  <div class="forest"></div>
  <canvas id="fireflies"></canvas>
  <canvas id="trees" class="trees"></canvas>
  <div class="content">
    <h1>fireflies</h1>
    <div class="line"></div>
    <p>in the hush of the ancient wood,<br>small lanterns rise to meet the dark —<br>each one a whispered wish<br>the forest chose to keep</p>
  </div>
  <a class="back" href="../">← return</a>
  <script>
    const c = document.getElementById('fireflies');
    const ctx = c.getContext('2d');
    const tc = document.getElementById('trees');
    const tctx = tc.getContext('2d');
    let mouse = { x: null, y: null };

    function resize() {
      c.width = tc.width = innerWidth;
      c.height = tc.height = innerHeight;
      drawTrees();
    }
    resize();
    addEventListener('resize', resize);
    addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });

    function drawTrees() {
      tctx.clearRect(0, 0, tc.width, tc.height);
      const h = tc.height;
      const w = tc.width;
      const treeCount = Math.floor(w / 60);
      for (let i = 0; i < treeCount; i++) {
        const x = (w / treeCount) * i + Math.sin(i * 7.3) * 30;
        const treeH = h * (0.3 + Math.abs(Math.sin(i * 2.7)) * 0.35);
        const trunkW = 3 + Math.random() * 4;
        const baseY = h;
        tctx.fillStyle = `rgba(5, 15, 3, ${0.6 + Math.random() * 0.3})`;
        tctx.beginPath();
        tctx.moveTo(x - trunkW, baseY);
        tctx.lineTo(x - trunkW * 0.3, baseY - treeH * 0.7);
        tctx.lineTo(x, baseY - treeH);
        tctx.lineTo(x + trunkW * 0.3, baseY - treeH * 0.7);
        tctx.lineTo(x + trunkW, baseY);
        tctx.closePath();
        tctx.fill();
        const branchCount = 2 + Math.floor(Math.random() * 4);
        for (let b = 0; b < branchCount; b++) {
          const by = baseY - treeH * (0.3 + b * 0.15);
          const blen = 15 + Math.random() * 25;
          const dir = Math.random() > 0.5 ? 1 : -1;
          tctx.strokeStyle = `rgba(5, 15, 3, ${0.4 + Math.random() * 0.2})`;
          tctx.lineWidth = 1;
          tctx.beginPath();
          tctx.moveTo(x, by);
          tctx.quadraticCurveTo(x + dir * blen * 0.6, by - 5, x + dir * blen, by + 5);
          tctx.stroke();
        }
      }
      for (let i = 0; i < 5; i++) {
        const gx = Math.random() * w;
        const gradH = h * 0.2;
        const grad = tctx.createRadialGradient(gx, h, 0, gx, h, gradH);
        grad.addColorStop(0, 'rgba(15, 40, 10, 0.15)');
        grad.addColorStop(1, 'transparent');
        tctx.fillStyle = grad;
        tctx.fillRect(gx - gradH, h - gradH, gradH * 2, gradH);
      }
    }

    class Firefly {
      constructor() { this.init(); this.y = Math.random() * c.height; }
      init() {
        this.x = Math.random() * c.width;
        this.y = c.height * (0.3 + Math.random() * 0.65);
        this.size = 1.5 + Math.random() * 2.5;
        this.baseOpacity = 0.2 + Math.random() * 0.5;
        this.opacity = 0;
        this.phase = Math.random() * Math.PI * 2;
        this.blinkSpeed = 0.015 + Math.random() * 0.025;
        this.blinkOffset = Math.random() * Math.PI * 2;
        this.wanderAngle = Math.random() * Math.PI * 2;
        this.wanderSpeed = 0.3 + Math.random() * 0.5;
        this.turnRate = 0.02 + Math.random() * 0.03;
        this.hue = 50 + Math.random() * 30;
        this.trail = [];
      }
      update() {
        this.wanderAngle += (Math.random() - 0.5) * this.turnRate * 2;
        this.x += Math.cos(this.wanderAngle) * this.wanderSpeed;
        this.y += Math.sin(this.wanderAngle) * this.wanderSpeed * 0.6;
        this.phase += this.blinkSpeed;
        const blink = Math.sin(this.phase + this.blinkOffset);
        this.opacity = this.baseOpacity * Math.max(0, blink);
        if (this.opacity > 0.05) {
          this.trail.push({ x: this.x, y: this.y, o: this.opacity * 0.3 });
          if (this.trail.length > 8) this.trail.shift();
        }
        this.trail.forEach(t => t.o *= 0.92);
        this.trail = this.trail.filter(t => t.o > 0.01);
        if (mouse.x !== null) {
          const dx = this.x - mouse.x;
          const dy = this.y - mouse.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 120) {
            const attract = (120 - dist) / 120 * 0.3;
            this.x -= dx / dist * attract;
            this.y -= dy / dist * attract;
          }
        }
        if (this.x < -20 || this.x > c.width + 20 || this.y < -20 || this.y > c.height + 20) this.init();
      }
      draw() {
        this.trail.forEach(t => {
          ctx.beginPath();
          ctx.arc(t.x, t.y, this.size * 0.5, 0, Math.PI * 2);
          ctx.fillStyle = `hsla(${this.hue}, 100%, 75%, ${t.o})`;
          ctx.fill();
        });
        if (this.opacity < 0.02) return;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${this.hue}, 100%, 80%, ${this.opacity})`;
        ctx.shadowBlur = this.size * 12;
        ctx.shadowColor = `hsla(${this.hue}, 100%, 65%, ${this.opacity * 0.8})`;
        ctx.fill();
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size * 3, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${this.hue}, 90%, 70%, ${this.opacity * 0.08})`;
        ctx.fill();
        ctx.shadowBlur = 0;
      }
    }

    const flies = [];
    for (let i = 0; i < 80; i++) flies.push(new Firefly());

    let stars = [];
    for (let i = 0; i < 100; i++) stars.push({ x: Math.random() * 3000, y: Math.random() * c.height * 0.4, s: Math.random() * 0.8 + 0.2, o: Math.random() * 0.4 + 0.1, p: Math.random() * Math.PI * 2 });
    let t = 0;

    function animate() {
      ctx.fillStyle = 'rgba(6, 13, 4, 0.15)';
      ctx.fillRect(0, 0, c.width, c.height);
      stars.forEach(s => {
        const flicker = s.o * (0.6 + 0.4 * Math.sin(t * 1.5 + s.p));
        ctx.beginPath();
        ctx.arc(s.x % c.width, s.y, s.s, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(220, 230, 200, ${flicker})`;
        ctx.fill();
      });
      flies.forEach(f => { f.update(); f.draw(); });
      t += 0.016;
      requestAnimationFrame(animate);
    }
    animate();
  </script>
</body>
</html>
