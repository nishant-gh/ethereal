<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ocean — Ethereal</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap');
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body { min-height: 100vh; overflow: hidden; background: #020a14; font-family: 'Cormorant Garamond', serif; color: #b0d4e8; }
  canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
  .content { position: relative; z-index: 10; text-align: center; padding: 2rem; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; animation: fadeIn 3s ease-out; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  h1 { font-size: clamp(2.5rem, 7vw, 6rem); font-weight: 300; letter-spacing: 0.25em; text-transform: lowercase; background: linear-gradient(135deg, #67e8f9 0%, #3b82f6 40%, #6366f1 70%, #a5b4fc 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; filter: drop-shadow(0 0 30px rgba(99, 102, 241, 0.3)); }
  .line { width: 100px; height: 1px; background: linear-gradient(90deg, transparent, rgba(99, 102, 241, 0.5), transparent); margin: 1.5rem auto; }
  p { font-size: clamp(0.95rem, 2vw, 1.3rem); font-weight: 300; font-style: italic; letter-spacing: 0.12em; opacity: 0.7; max-width: 450px; line-height: 1.8; }
  a.back { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); color: rgba(176, 212, 232, 0.4); text-decoration: none; font-size: 0.9rem; letter-spacing: 0.2em; transition: color 0.3s; z-index: 20; }
  a.back:hover { color: rgba(176, 212, 232, 0.8); }
</style>
</head>
<body>
  <canvas id="ocean"></canvas>
  <div class="content">
    <h1>ocean</h1>
    <div class="line"></div>
    <p>every wave carries a secret<br>from the deep —<br>if you listen, the tide<br>will whisper your name</p>
  </div>
  <a class="back" href="../">← return</a>
  <script>
    const c = document.getElementById('ocean');
    const ctx = c.getContext('2d');
    function resize() { c.width = innerWidth; c.height = innerHeight; }
    resize(); addEventListener('resize', resize);
    const waves = [];
    for (let i = 0; i < 8; i++) {
      waves.push({
        y: c.height * 0.5 + i * 25,
        amplitude: 15 + i * 5,
        frequency: 0.006 - i * 0.0004,
        speed: 0.015 + i * 0.003,
        phase: i * 0.8,
        alpha: 0.04 - i * 0.003
      });
    }
    let particles = [];
    for (let i = 0; i < 80; i++) {
      particles.push({
        x: Math.random() * 3000,
        y: Math.random() * 2000,
        s: Math.random() * 2 + 0.5,
        speedX: (Math.random() - 0.5) * 0.2,
        speedY: Math.random() * 0.3 + 0.1,
        opacity: Math.random() * 0.3 + 0.1,
        pulse: Math.random() * Math.PI * 2
      });
    }
    let t = 0;
    function draw() {
      const grad = ctx.createLinearGradient(0, 0, 0, c.height);
      grad.addColorStop(0, '#020a14');
      grad.addColorStop(0.4, '#041428');
      grad.addColorStop(0.6, '#061a35');
      grad.addColorStop(1, '#0a2240');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, c.width, c.height);
      const moonX = c.width * 0.75;
      const moonY = c.height * 0.15;
      const moonGrad = ctx.createRadialGradient(moonX, moonY, 0, moonX, moonY, 200);
      moonGrad.addColorStop(0, 'rgba(200, 220, 255, 0.15)');
      moonGrad.addColorStop(0.3, 'rgba(150, 180, 230, 0.05)');
      moonGrad.addColorStop(1, 'transparent');
      ctx.fillStyle = moonGrad;
      ctx.fillRect(0, 0, c.width, c.height);
      ctx.beginPath(); ctx.arc(moonX, moonY, 30, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(210, 230, 255, 0.8)'; ctx.fill();
      ctx.shadowBlur = 40; ctx.shadowColor = 'rgba(180, 210, 255, 0.4)';
      ctx.fill(); ctx.shadowBlur = 0;
      waves.forEach(w => {
        ctx.beginPath();
        ctx.moveTo(0, c.height);
        for (let x = 0; x <= c.width; x += 3) {
          const y = w.y + Math.sin(x * w.frequency + t * w.speed + w.phase) * w.amplitude
            + Math.sin(x * w.frequency * 2.3 + t * w.speed * 0.7) * w.amplitude * 0.3;
          ctx.lineTo(x, y);
        }
        ctx.lineTo(c.width, c.height);
        ctx.closePath();
        ctx.fillStyle = `rgba(10, 40, 80, ${w.alpha})`;
        ctx.fill();
        ctx.strokeStyle = `rgba(100, 180, 255, ${w.alpha * 0.8})`;
        ctx.lineWidth = 0.5;
        ctx.stroke();
      });
      const reflectGrad = ctx.createLinearGradient(moonX - 30, c.height * 0.5, moonX + 30, c.height);
      reflectGrad.addColorStop(0, 'rgba(180, 210, 255, 0.06)');
      reflectGrad.addColorStop(1, 'transparent');
      for (let y = c.height * 0.5; y < c.height; y += 4) {
        const shimmer = Math.sin(y * 0.05 + t * 0.03) * 15;
        const width = 2 + Math.random() * 3;
        ctx.fillStyle = `rgba(180, 210, 255, ${0.04 * (1 - (y - c.height*0.5) / (c.height * 0.5))})`;
        ctx.fillRect(moonX - width + shimmer, y, width * 2, 2);
      }
      particles.forEach(p => {
        p.x += p.speedX; p.y += p.speedY; p.pulse += 0.01;
        if (p.y > c.height + 10) { p.y = -10; p.x = Math.random() * c.width; }
        if (p.x < -10) p.x = c.width + 10;
        if (p.x > c.width + 10) p.x = -10;
        const glow = p.opacity * (0.6 + 0.4 * Math.sin(p.pulse));
        ctx.beginPath(); ctx.arc(p.x % c.width, p.y, p.s, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(130, 200, 255, ${glow})`;
        ctx.shadowBlur = p.s * 6; ctx.shadowColor = `rgba(100, 180, 255, ${glow * 0.5})`;
        ctx.fill(); ctx.shadowBlur = 0;
      });
      t += 0.016;
      requestAnimationFrame(draw);
    }
    draw();
  </script>
</body>
</html>
