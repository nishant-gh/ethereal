<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sakura — Ethereal</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap');
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body { min-height: 100vh; overflow: hidden; background: #0c0814; font-family: 'Cormorant Garamond', serif; color: #f0d4e8; }
  canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
  .content { position: relative; z-index: 10; text-align: center; padding: 2rem; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; animation: fadeIn 3s ease-out; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  h1 { font-size: clamp(2.5rem, 7vw, 6rem); font-weight: 300; letter-spacing: 0.25em; text-transform: lowercase; background: linear-gradient(135deg, #fbb6ce 0%, #f9a8d4 30%, #f472b6 60%, #fce7f3 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; filter: drop-shadow(0 0 30px rgba(244, 114, 182, 0.4)); animation: pulse 5s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { filter: drop-shadow(0 0 30px rgba(244, 114, 182, 0.3)); } 50% { filter: drop-shadow(0 0 50px rgba(244, 114, 182, 0.6)); } }
  .line { width: 100px; height: 1px; background: linear-gradient(90deg, transparent, rgba(244, 114, 182, 0.4), transparent); margin: 1.5rem auto; }
  p { font-size: clamp(0.95rem, 2vw, 1.3rem); font-weight: 300; font-style: italic; letter-spacing: 0.12em; opacity: 0.7; max-width: 450px; line-height: 1.8; }
  a.back { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); color: rgba(240, 212, 232, 0.4); text-decoration: none; font-size: 0.9rem; letter-spacing: 0.2em; transition: color 0.3s; z-index: 20; }
  a.back:hover { color: rgba(240, 212, 232, 0.8); }
</style>
</head>
<body>
  <canvas id="sakura"></canvas>
  <div class="content">
    <h1>sakura</h1>
    <div class="line"></div>
    <p>the petals do not fall —<br>they are released,<br>each one a tender letting go<br>the tree has practiced all winter</p>
  </div>
  <a class="back" href="../">← return</a>
  <script>
    const c = document.getElementById('sakura');
    const ctx = c.getContext('2d');
    let mouse = { x: null, y: null };
    function resize() { c.width = innerWidth; c.height = innerHeight; }
    resize(); addEventListener('resize', resize);
    addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });

    // Moon
    const moon = { x: 0.2, y: 0.18, r: 45 };

    // Stars
    const stars = [];
    for (let i = 0; i < 120; i++) stars.push({ x: Math.random(), y: Math.random() * 0.6, s: Math.random() * 1 + 0.3, o: Math.random() * 0.5 + 0.1, p: Math.random() * Math.PI * 2 });

    // Branch silhouette
    function drawBranch(ctx, x, y, len, angle, depth, w) {
      if (depth <= 0 || len < 3) return;
      const ex = x + Math.cos(angle) * len;
      const ey = y + Math.sin(angle) * len;
      ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(ex, ey);
      ctx.strokeStyle = `rgba(30, 15, 25, ${0.7 + depth * 0.05})`;
      ctx.lineWidth = w; ctx.stroke();
      const branches = depth > 3 ? 2 : (Math.random() > 0.3 ? 2 : 3);
      for (let i = 0; i < branches; i++) {
        const newAngle = angle + (Math.random() - 0.5) * 1.2;
        const newLen = len * (0.6 + Math.random() * 0.2);
        drawBranch(ctx, ex, ey, newLen, newAngle, depth - 1, w * 0.7);
      }
    }

    // Petals
    class Petal {
      constructor() { this.init(true); }
      init(anywhere) {
        this.x = Math.random() * c.width;
        this.y = anywhere ? Math.random() * c.height : -20;
        this.size = 3 + Math.random() * 5;
        this.speedY = 0.3 + Math.random() * 0.8;
        this.speedX = (Math.random() - 0.5) * 0.4;
        this.wobbleAmp = 1 + Math.random() * 2;
        this.wobbleFreq = 0.02 + Math.random() * 0.02;
        this.wobblePhase = Math.random() * Math.PI * 2;
        this.rotation = Math.random() * Math.PI * 2;
        this.rotSpeed = (Math.random() - 0.5) * 0.04;
        this.opacity = 0.4 + Math.random() * 0.5;
        this.hue = 330 + Math.random() * 20;
        this.sat = 60 + Math.random() * 30;
        this.lightness = 75 + Math.random() * 15;
      }
      update(t) {
        this.wobblePhase += this.wobbleFreq;
        this.x += this.speedX + Math.sin(this.wobblePhase) * this.wobbleAmp * 0.3;
        this.y += this.speedY;
        this.rotation += this.rotSpeed;
        if (mouse.x !== null) {
          const dx = this.x - mouse.x;
          const dy = this.y - mouse.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 100) {
            const force = (100 - dist) / 100;
            this.x += dx / dist * force * 1.5;
            this.y += dy / dist * force * 0.5;
            this.rotSpeed += force * 0.01;
          }
        }
        if (this.y > c.height + 20 || this.x < -30 || this.x > c.width + 30) this.init(false);
      }
      draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rotation);
        ctx.beginPath();
        ctx.moveTo(0, -this.size);
        ctx.bezierCurveTo(this.size * 0.8, -this.size * 0.5, this.size * 0.8, this.size * 0.5, 0, this.size);
        ctx.bezierCurveTo(-this.size * 0.8, this.size * 0.5, -this.size * 0.8, -this.size * 0.5, 0, -this.size);
        ctx.fillStyle = `hsla(${this.hue}, ${this.sat}%, ${this.lightness}%, ${this.opacity})`;
        ctx.shadowBlur = this.size * 3;
        ctx.shadowColor = `hsla(${this.hue}, 80%, 70%, ${this.opacity * 0.3})`;
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.restore();
      }
    }

    const petals = [];
    for (let i = 0; i < 100; i++) petals.push(new Petal());

    // Ground petals accumulation
    const groundPetals = [];
    for (let i = 0; i < 60; i++) {
      groundPetals.push({
        x: Math.random() * 3000,
        y: c.height - Math.random() * 30 - 5,
        size: 2 + Math.random() * 4,
        rot: Math.random() * Math.PI * 2,
        hue: 330 + Math.random() * 20,
        o: 0.15 + Math.random() * 0.2
      });
    }

    let t = 0;
    let branchCanvas = null;

    function createBranchCanvas() {
      branchCanvas = document.createElement('canvas');
      branchCanvas.width = c.width;
      branchCanvas.height = c.height;
      const bctx = branchCanvas.getContext('2d');
      drawBranch(bctx, c.width * 0.85, c.height * 0.08, c.height * 0.18, Math.PI * 0.55, 7, 5);
      drawBranch(bctx, c.width * 0.9, c.height * 0.02, c.height * 0.14, Math.PI * 0.65, 6, 4);
      drawBranch(bctx, -10, c.height * 0.15, c.height * 0.12, -0.3, 5, 3);
    }

    function animate() {
      // Sky gradient
      const grad = ctx.createLinearGradient(0, 0, 0, c.height);
      grad.addColorStop(0, '#0c0814');
      grad.addColorStop(0.5, '#140e20');
      grad.addColorStop(0.85, '#1a1028');
      grad.addColorStop(1, '#12081c');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, c.width, c.height);

      // Stars
      stars.forEach(s => {
        const flicker = s.o * (0.6 + 0.4 * Math.sin(t * 1.5 + s.p));
        ctx.beginPath();
        ctx.arc(s.x * c.width, s.y * c.height, s.s, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(240, 220, 255, ${flicker})`;
        ctx.fill();
      });

      // Moon
      const mx = moon.x * c.width, my = moon.y * c.height;
      const moonGrad = ctx.createRadialGradient(mx, my, 0, mx, my, moon.r * 4);
      moonGrad.addColorStop(0, 'rgba(255, 230, 245, 0.2)');
      moonGrad.addColorStop(0.5, 'rgba(244, 180, 220, 0.05)');
      moonGrad.addColorStop(1, 'transparent');
      ctx.fillStyle = moonGrad;
      ctx.fillRect(0, 0, c.width, c.height);
      ctx.beginPath(); ctx.arc(mx, my, moon.r, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255, 235, 245, 0.85)';
      ctx.shadowBlur = 50; ctx.shadowColor = 'rgba(244, 180, 220, 0.5)';
      ctx.fill(); ctx.shadowBlur = 0;

      // Branches
      if (!branchCanvas || branchCanvas.width !== c.width) createBranchCanvas();
      ctx.drawImage(branchCanvas, 0, 0);

      // Ground
      const groundGrad = ctx.createLinearGradient(0, c.height - 40, 0, c.height);
      groundGrad.addColorStop(0, 'transparent');
      groundGrad.addColorStop(1, 'rgba(15, 8, 20, 0.6)');
      ctx.fillStyle = groundGrad;
      ctx.fillRect(0, c.height - 40, c.width, 40);

      // Ground petals
      groundPetals.forEach(gp => {
        ctx.save();
        ctx.translate(gp.x % c.width, Math.min(gp.y, c.height - 5));
        ctx.rotate(gp.rot);
        ctx.beginPath();
        ctx.ellipse(0, 0, gp.size, gp.size * 0.5, 0, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${gp.hue}, 70%, 75%, ${gp.o})`;
        ctx.fill();
        ctx.restore();
      });

      // Falling petals
      petals.forEach(p => { p.update(t); p.draw(); });

      t += 0.016;
      requestAnimationFrame(animate);
    }
    animate();
  </script>
</body>
</html>
