<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aurora — Ethereal</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap');
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body { min-height: 100vh; overflow: hidden; background: #020810; font-family: 'Cormorant Garamond', serif; color: #d0e8f0; }
  canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
  .content { position: relative; z-index: 10; text-align: center; padding: 2rem; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; animation: fadeIn 3s ease-out; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  h1 { font-size: clamp(2.5rem, 7vw, 6rem); font-weight: 300; letter-spacing: 0.25em; text-transform: lowercase; background: linear-gradient(135deg, #4ade80 0%, #22d3ee 30%, #a78bfa 60%, #f472b6 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; filter: drop-shadow(0 0 30px rgba(74, 222, 128, 0.3)); }
  .line { width: 100px; height: 1px; background: linear-gradient(90deg, transparent, rgba(74, 222, 128, 0.5), transparent); margin: 1.5rem auto; }
  p { font-size: clamp(0.95rem, 2vw, 1.3rem); font-weight: 300; font-style: italic; letter-spacing: 0.12em; opacity: 0.7; max-width: 450px; line-height: 1.8; }
  a.back { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); color: rgba(200, 230, 240, 0.4); text-decoration: none; font-size: 0.9rem; letter-spacing: 0.2em; transition: color 0.3s; z-index: 20; }
  a.back:hover { color: rgba(200, 230, 240, 0.8); }
</style>
</head>
<body>
  <canvas id="aurora"></canvas>
  <div class="content">
    <h1>aurora</h1>
    <div class="line"></div>
    <p>the sky remembers every color<br>it has ever held —<br>and tonight it speaks them all</p>
  </div>
  <a class="back" href="../">← return</a>
  <script>
    const c = document.getElementById('aurora');
    const ctx = c.getContext('2d');
    function resize() { c.width = innerWidth; c.height = innerHeight; }
    resize(); addEventListener('resize', resize);
    const bands = [];
    for (let i = 0; i < 5; i++) {
      bands.push({
        y: c.height * (0.15 + i * 0.06),
        amplitude: 40 + Math.random() * 30,
        frequency: 0.003 + Math.random() * 0.002,
        speed: 0.008 + Math.random() * 0.006,
        phase: Math.random() * Math.PI * 2,
        hue: [140, 160, 180, 270, 320][i],
        width: 80 + Math.random() * 60
      });
    }
    let stars = [];
    for (let i = 0; i < 200; i++) stars.push({ x: Math.random() * 3000, y: Math.random() * 2000, s: Math.random() * 1.2 + 0.2, o: Math.random() * 0.8 + 0.2, p: Math.random() * Math.PI * 2 });
    let t = 0;
    function draw() {
      ctx.fillStyle = '#020810';
      ctx.fillRect(0, 0, c.width, c.height);
      stars.forEach(s => {
        const flicker = s.o * (0.7 + 0.3 * Math.sin(t * 2 + s.p));
        ctx.beginPath(); ctx.arc(s.x % c.width, s.y % c.height, s.s, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(220,240,255,${flicker})`; ctx.fill();
      });
      bands.forEach(b => {
        for (let x = 0; x < c.width; x += 2) {
          const wave = Math.sin(x * b.frequency + t * b.speed + b.phase) * b.amplitude;
          const wave2 = Math.sin(x * b.frequency * 1.5 + t * b.speed * 0.7) * b.amplitude * 0.5;
          const y = b.y + wave + wave2;
          const intensity = 0.03 + 0.02 * Math.sin(x * 0.005 + t * 0.01);
          const grad = ctx.createLinearGradient(x, y - b.width, x, y + b.width);
          grad.addColorStop(0, 'transparent');
          grad.addColorStop(0.3, `hsla(${b.hue}, 80%, 60%, ${intensity * 0.5})`);
          grad.addColorStop(0.5, `hsla(${b.hue}, 90%, 65%, ${intensity})`);
          grad.addColorStop(0.7, `hsla(${b.hue}, 80%, 60%, ${intensity * 0.5})`);
          grad.addColorStop(1, 'transparent');
          ctx.fillStyle = grad;
          ctx.fillRect(x, y - b.width, 2, b.width * 2);
        }
      });
      t += 0.016;
      requestAnimationFrame(draw);
    }
    draw();
  </script>
</body>
</html>
