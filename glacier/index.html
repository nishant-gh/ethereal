<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ethereal — Glacier</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    overflow: hidden;
    background: #040810;
    font-family: 'Cormorant Garamond', serif;
    color: #c8e0f0;
  }

  canvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
  }

  .content {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 10;
    text-align: center;
    padding: 2rem;
    animation: fadeIn 4s ease-out;
    pointer-events: none;
  }

  .content > * { pointer-events: auto; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translate(-50%, -50%) translateY(20px); }
    to { opacity: 1; transform: translate(-50%, -50%) translateY(0); }
  }

  h1 {
    font-size: clamp(2.5rem, 6vw, 5rem);
    font-weight: 300;
    letter-spacing: 0.3em;
    text-transform: lowercase;
    background: linear-gradient(135deg, #a8e0ff 0%, #e0f4ff 30%, #60b8e0 60%, #c0e8ff 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 35px rgba(100, 180, 230, 0.3));
    animation: shimmer 6s ease-in-out infinite;
  }

  @keyframes shimmer {
    0%, 100% { filter: drop-shadow(0 0 35px rgba(100, 180, 230, 0.3)); }
    50% { filter: drop-shadow(0 0 55px rgba(130, 200, 250, 0.5)); }
  }

  .line {
    width: 120px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(130, 200, 250, 0.5), transparent);
    margin: 1.5rem auto;
  }

  p {
    font-size: clamp(1rem, 2.5vw, 1.3rem);
    font-weight: 300;
    font-style: italic;
    letter-spacing: 0.15em;
    opacity: 0.6;
    max-width: 460px;
    margin: 0 auto;
    line-height: 1.8;
  }

  .back {
    display: inline-block;
    margin-top: 1.5rem;
    color: rgba(150, 200, 230, 0.35);
    text-decoration: none;
    font-size: 0.95rem;
    letter-spacing: 0.2em;
    transition: color 0.5s ease;
  }

  .back:hover {
    color: rgba(170, 220, 250, 0.8);
  }
</style>
</head>
<body>
  <canvas id="glacier"></canvas>

  <div class="content">
    <h1>glacier</h1>
    <div class="line"></div>
    <p>time made visible in blue,<br>each layer a century of silence<br>compressed into frozen light</p>
    <a class="back" href="../">&larr; return</a>
  </div>

  <script>
    const canvas = document.getElementById('glacier');
    const ctx = canvas.getContext('2d');
    let W, H;
    let mouse = { x: -1000, y: -1000 };
    let time = 0;

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);
    window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });

    // Ice crystals — geometric hexagonal shapes
    class Crystal {
      constructor() {
        this.x = Math.random() * W;
        this.y = Math.random() * H;
        this.size = Math.random() * 15 + 5;
        this.rotation = Math.random() * Math.PI * 2;
        this.rotSpeed = (Math.random() - 0.5) * 0.003;
        this.drift = { x: (Math.random() - 0.5) * 0.15, y: Math.random() * 0.2 + 0.05 };
        this.opacity = Math.random() * 0.25 + 0.05;
        this.sides = Math.random() < 0.5 ? 6 : 4;
        this.hue = Math.random() * 30 + 190; // 190-220 cyan to blue
        this.pulsePhase = Math.random() * Math.PI * 2;
        this.pulseSpeed = Math.random() * 0.015 + 0.005;
      }
      update() {
        this.x += this.drift.x;
        this.y += this.drift.y;
        this.rotation += this.rotSpeed;
        this.pulsePhase += this.pulseSpeed;

        // Mouse creates frost burst — crystals scatter away
        const dx = this.x - mouse.x;
        const dy = this.y - mouse.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 120 && dist > 0) {
          const force = (120 - dist) / 120;
          this.x += (dx / dist) * force * 1.2;
          this.y += (dy / dist) * force * 1.2;
          this.rotSpeed += force * 0.005;
        }

        if (this.y > H + 20) {
          this.y = -20;
          this.x = Math.random() * W;
        }
        if (this.x < -20) this.x = W + 20;
        if (this.x > W + 20) this.x = -20;
      }
      draw() {
        const pulse = 1 + 0.2 * Math.sin(this.pulsePhase);
        const alpha = this.opacity * pulse;
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rotation);

        const s = this.size;
        ctx.beginPath();
        for (let i = 0; i < this.sides; i++) {
          const angle = (i / this.sides) * Math.PI * 2 - Math.PI / 2;
          const px = Math.cos(angle) * s;
          const py = Math.sin(angle) * s;
          i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
        }
        ctx.closePath();
        ctx.strokeStyle = `hsla(${this.hue}, 60%, 75%, ${alpha})`;
        ctx.lineWidth = 0.6;
        ctx.stroke();

        // Inner structure lines
        for (let i = 0; i < this.sides; i++) {
          const angle = (i / this.sides) * Math.PI * 2 - Math.PI / 2;
          ctx.beginPath();
          ctx.moveTo(0, 0);
          ctx.lineTo(Math.cos(angle) * s * 0.6, Math.sin(angle) * s * 0.6);
          ctx.strokeStyle = `hsla(${this.hue}, 50%, 80%, ${alpha * 0.4})`;
          ctx.lineWidth = 0.3;
          ctx.stroke();
        }

        // Center glow
        const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, s * 0.5);
        grad.addColorStop(0, `hsla(${this.hue}, 70%, 85%, ${alpha * 0.3})`);
        grad.addColorStop(1, `hsla(${this.hue}, 70%, 85%, 0)`);
        ctx.fillStyle = grad;
        ctx.fill();

        ctx.restore();
      }
    }

    // Prismatic light beams — refracted through ice
    class PrismBeam {
      constructor() {
        this.x = Math.random() * W;
        this.topY = Math.random() * H * 0.3;
        this.bottomY = this.topY + Math.random() * H * 0.5 + H * 0.2;
        this.width = Math.random() * 30 + 10;
        this.hue = Math.random() * 60 + 180; // cyan to blue-violet
        this.alpha = Math.random() * 0.02 + 0.005;
        this.driftSpeed = (Math.random() - 0.5) * 0.05;
        this.pulsePhase = Math.random() * Math.PI * 2;
        this.pulseSpeed = Math.random() * 0.006 + 0.002;
      }
      update() {
        this.x += this.driftSpeed;
        this.pulsePhase += this.pulseSpeed;
        if (this.x < -50) this.x = W + 50;
        if (this.x > W + 50) this.x = -50;
      }
      draw() {
        const pulse = 1 + 0.4 * Math.sin(this.pulsePhase);
        const a = this.alpha * pulse;

        // Mouse proximity brightens beams
        const dx = this.x - mouse.x;
        const dist = Math.abs(dx);
        const boost = dist < 200 ? 1 + (200 - dist) / 200 * 2 : 1;

        const grad = ctx.createLinearGradient(this.x, this.topY, this.x, this.bottomY);
        grad.addColorStop(0, `hsla(${this.hue}, 60%, 80%, 0)`);
        grad.addColorStop(0.2, `hsla(${this.hue}, 60%, 80%, ${a * boost})`);
        grad.addColorStop(0.5, `hsla(${this.hue + 20}, 70%, 85%, ${a * 1.2 * boost})`);
        grad.addColorStop(0.8, `hsla(${this.hue + 40}, 60%, 80%, ${a * boost})`);
        grad.addColorStop(1, `hsla(${this.hue + 40}, 60%, 80%, 0)`);

        ctx.fillStyle = grad;
        ctx.fillRect(this.x - this.width / 2, this.topY, this.width, this.bottomY - this.topY);
      }
    }

    // Snow/ice particles
    class IceDust {
      constructor() {
        this.reset();
        this.y = Math.random() * H;
      }
      reset() {
        this.x = Math.random() * W;
        this.y = -5;
        this.size = Math.random() * 2 + 0.3;
        this.speed = Math.random() * 0.5 + 0.1;
        this.wobble = Math.random() * Math.PI * 2;
        this.wobbleSpeed = Math.random() * 0.03 + 0.01;
        this.wobbleAmp = Math.random() * 0.8 + 0.2;
        this.opacity = Math.random() * 0.5 + 0.2;
      }
      update() {
        this.y += this.speed;
        this.wobble += this.wobbleSpeed;
        this.x += Math.sin(this.wobble) * this.wobbleAmp;

        if (this.y > H + 10) this.reset();
      }
      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(200, 230, 255, ${this.opacity})`;
        ctx.shadowBlur = this.size * 4;
        ctx.shadowColor = 'rgba(150, 210, 255, 0.3)';
        ctx.fill();
        ctx.shadowBlur = 0;
      }
    }

    // Background stars (very faint, high in the sky)
    const stars = [];
    for (let i = 0; i < 100; i++) {
      stars.push({
        x: Math.random(), y: Math.random() * 0.5,
        size: Math.random() * 0.8 + 0.2,
        alpha: Math.random() * 0.4 + 0.1,
        twinkle: Math.random() * 0.02 + 0.005,
        phase: Math.random() * Math.PI * 2
      });
    }

    const crystals = [];
    for (let i = 0; i < 40; i++) crystals.push(new Crystal());

    const beams = [];
    for (let i = 0; i < 12; i++) beams.push(new PrismBeam());

    const dust = [];
    for (let i = 0; i < 100; i++) dust.push(new IceDust());

    // Glacier landscape silhouette
    function drawLandscape() {
      // Mountain/glacier shapes at the bottom
      const grad = ctx.createLinearGradient(0, H * 0.65, 0, H);
      grad.addColorStop(0, 'rgba(8, 20, 35, 0)');
      grad.addColorStop(0.3, 'rgba(10, 25, 45, 0.4)');
      grad.addColorStop(0.6, 'rgba(8, 18, 35, 0.7)');
      grad.addColorStop(1, 'rgba(4, 10, 20, 0.9)');

      ctx.beginPath();
      ctx.moveTo(0, H);
      // Jagged ice formations
      const points = 20;
      for (let i = 0; i <= points; i++) {
        const px = (i / points) * W;
        const baseY = H * 0.78;
        const peak = Math.sin(i * 0.7 + 1) * H * 0.06
                   + Math.sin(i * 1.3 + 3) * H * 0.04
                   + Math.sin(i * 2.1) * H * 0.02;
        ctx.lineTo(px, baseY + peak);
      }
      ctx.lineTo(W, H);
      ctx.closePath();
      ctx.fillStyle = grad;
      ctx.fill();

      // Ice surface glow
      const iceGrad = ctx.createLinearGradient(0, H * 0.75, 0, H * 0.82);
      const pulse = 0.5 + 0.5 * Math.sin(time * 0.004);
      iceGrad.addColorStop(0, `rgba(100, 180, 230, ${0.03 + pulse * 0.02})`);
      iceGrad.addColorStop(1, 'rgba(100, 180, 230, 0)');
      ctx.fillStyle = iceGrad;
      ctx.fillRect(0, H * 0.72, W, H * 0.1);
    }

    function drawStars() {
      stars.forEach(s => {
        const tw = 0.5 + 0.5 * Math.sin(time * s.twinkle + s.phase);
        ctx.beginPath();
        ctx.arc(s.x * W, s.y * H, s.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(200, 220, 255, ${s.alpha * tw})`;
        ctx.fill();
      });
    }

    function animate() {
      time++;

      ctx.fillStyle = 'rgba(4, 8, 16, 0.12)';
      ctx.fillRect(0, 0, W, H);

      drawStars();

      beams.forEach(b => { b.update(); b.draw(); });

      drawLandscape();

      crystals.forEach(c => { c.update(); c.draw(); });
      dust.forEach(d => { d.update(); d.draw(); });

      requestAnimationFrame(animate);
    }

    ctx.fillStyle = '#040810';
    ctx.fillRect(0, 0, W, H);
    animate();
  </script>
</body>
</html>
